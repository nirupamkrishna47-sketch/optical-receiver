<!DOCTYPE html>
<html>
<head>
  <title>Optical Camera Receiver</title>

  <style>

    body {
      background: #0f1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: cyan;
    }

    video {
      width: 320px;
      border-radius: 20px;
      border: 4px solid cyan;
      margin-top: 20px;
    }

    .box {

      background: #1a1d26;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 700px;
      border-radius: 15px;
    }

    #binary {

      color: lime;
      font-size: 22px;
      word-wrap: break-word;
      min-height: 50px;
    }

    #decoded {

      color: cyan;
      font-size: 40px;
      min-height: 60px;
    }

    #status {

      font-size: 30px;
      margin-top: 20px;
    }

    button {

      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
    }

    #resetBtn {
      background: crimson;
      color: white;
    }

    #pauseBtn {
      background: orange;
      color: black;
    }

  </style>
</head>

<body>

<h1>Optical Communication Receiver</h1>

<video id="video" autoplay playsinline></video>

<div id="status">
Waiting...
</div>

<div class="box">

<h2>Binary Data</h2>

<div id="binary"></div>

</div>

<div class="box">

<h2>Decoded Text</h2>

<div id="decoded"></div>

</div>

<button id="resetBtn" onclick="resetData()">
Reset
</button>

<button id="pauseBtn" onclick="togglePause()">
Pause
</button>

<canvas id="canvas" width="100" height="100" style="display:none;"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let binary = "";
let waitingForPulse = false;
let paused = false;

function resetData() {

  binary = "";

  document.getElementById("binary").innerText = "";

  document.getElementById("decoded").innerText = "";

  document.getElementById("status").innerText = "Reset Complete";
}

function togglePause() {

  paused = !paused;

  document.getElementById("pauseBtn").innerText =
    paused ? "Resume" : "Pause";
}

function binaryToText(binary) {

  let result = "";

  for (let i = 0; i < binary.length; i += 8) {

    let byte = binary.substr(i, 8);

    if (byte.length < 8) continue;

    let decimal = parseInt(byte, 2);

    result += String.fromCharCode(decimal);
  }

  return result;
}

navigator.mediaDevices.getUserMedia({

  video: {
    facingMode: "environment"
  }

})

.then(stream => {

  video.srcObject = stream;

  setInterval(scanFrame, 250);

})

.catch(err => {

  alert("Camera Error: " + err);

});

function scanFrame() {

  if (paused) return;

  ctx.drawImage(video, 0, 0, 100, 100);

  const frame = ctx.getImageData(0, 0, 100, 100);

  let r = 0;
  let g = 0;
  let b = 0;

  for (let i = 0; i < frame.data.length; i += 4) {

    r += frame.data[i];
    g += frame.data[i + 1];
    b += frame.data[i + 2];
  }

  const pixels = frame.data.length / 4;

  r /= pixels;
  g /= pixels;
  b /= pixels;

  // BLUE separator detection
  if (b > 100 && r < 80 && g < 80) {

    waitingForPulse = true;

    document.getElementById("status").innerText =
      "Separator Detected (BLUE)";

    return;
  }

  if (waitingForPulse) {

    // WHITE = 1
    if (r > 180 && g > 180 && b > 180) {

      binary += "1";

      waitingForPulse = false;

      document.getElementById("status").innerText =
        "Detected: 1";
    }

    // BLACK = 0
    else if (r < 60 && g < 60 && b < 60) {

      binary += "0";

      waitingForPulse = false;

      document.getElementById("status").innerText =
        "Detected: 0";
    }

    document.getElementById("binary").innerText = binary;

    document.getElementById("decoded").innerText =
      binaryToText(binary);
  }
}

</script>

</body>
</html>
