<!DOCTYPE html>
<html>
<head>
  <title>Camera Optical Receiver</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    video {
      width: 300px;
      border: 3px solid white;
      margin-top: 20px;
    }

    #binary {
      font-size: 28px;
      color: lime;
      margin-top: 20px;
      word-wrap: break-word;
    }

    #text {
      font-size: 40px;
      color: cyan;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Camera Optical Receiver</h1>

<video id="video" autoplay playsinline></video>

<div id="binary"></div>

<div id="text"></div>

<canvas id="canvas" width="100" height="100" style="display:none;"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let binary = "";
let waitingForPulse = false;

function binaryToText(binary) {

  let result = "";

  for (let i = 0; i < binary.length; i += 8) {

    let byte = binary.substr(i, 8);

    if (byte.length < 8) continue;

    result += String.fromCharCode(parseInt(byte, 2));
  }

  return result;
}

navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "environment"
  }
})

.then(stream => {

  video.srcObject = stream;

  setInterval(scanFrame, 150);

});

function scanFrame() {

  ctx.drawImage(video, 0, 0, 100, 100);

  const frame = ctx.getImageData(0, 0, 100, 100);

  let r = 0;
  let g = 0;
  let b = 0;

  for (let i = 0; i < frame.data.length; i += 4) {

    r += frame.data[i];
    g += frame.data[i + 1];
    b += frame.data[i + 2];
  }

  const pixels = frame.data.length / 4;

  r /= pixels;
  g /= pixels;
  b /= pixels;

  // Detect RED separator
  if (r > 120 && g < 80 && b < 80) {

    waitingForPulse = true;
    return;
  }

  // Only accept pulse AFTER red
  if (waitingForPulse) {

    // WHITE = 1
    if (r > 180 && g > 180 && b > 180) {

      binary += "1";
      waitingForPulse = false;
    }

    // BLACK = 0
    else if (r < 50 && g < 50 && b < 50) {

      binary += "0";
      waitingForPulse = false;
    }

    document.getElementById("binary").innerText = binary;

    document.getElementById("text").innerText = binaryToText(binary);
  }
}

</script>

</body>
</html>
